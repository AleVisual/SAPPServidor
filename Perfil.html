<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil de Usuario - SApp</title>
    <link rel="icon" href="assets/icono.png" type="image/png">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/modals.css">
    <link rel="stylesheet" href="css/Perfil.css">
</head>
<body class="profile-page">
    <div class="glow-container">
        <div class="glow-orb orb-1"></div>
        <div class="glow-orb orb-2"></div>
    </div>

    <div class="profile-container">
        <header class="profile-header">
            <button class="btn-back" onclick="window.location.href='dashboard.html'">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M19 12H5M12 19l-7-7 7-7"></path>
                </svg>
                Volver al Panel
            </button>
            <h1>Configuración de Perfil</h1>
        </header>

        <main class="profile-content">
            <div class="profile-card-main">
                <div class="avatar-uploader-section">
                    <div class="avatar-current-wrapper">
                        <img id="profilePreview" src="assets/default-avatar.png" alt="Avatar">
                        <div class="avatar-overlay">
                            <label for="avatarInput" class="btn-change-avatar">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
                                    <circle cx="12" cy="13" r="4"></circle>
                                </svg>
                                Cambiar
                            </label>
                            <button id="deleteAvatarBtn" class="btn-delete-avatar" title="Eliminar Foto" style="display:none;">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <polyline points="3 6 5 6 21 6"></polyline>
                                    <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                                </svg>
                            </button>
                        </div>
                    </div>
                    <input type="file" id="avatarInput" accept="image/*" hidden>
                    <p class="uploader-info">Recomendado: Imagen cuadrada (JPG, PNG o WebP, Máx 5MB)</p>
                    
                    <button id="saveProfileBtn" class="btn-save-floating" disabled>
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                            <polyline points="20 6 9 17 4 12"></polyline>
                        </svg>
                        Aceptar y Guardar Foto
                    </button>
                </div>

                <div class="user-details-section">
                    <div class="detail-group">
                        <label>Nombre de Usuario</label>
                        <div class="detail-value" id="userNameLabel">Cargando...</div>
                    </div>
                    <div class="detail-group">
                        <label>Carpeta Asignada</label>
                        <div class="detail-value" id="userFolderLabel">Cargando...</div>
                    </div>
                    <div class="detail-group">
                        <label>Fecha de Creación</label>
                        <div class="detail-value" id="userDateLabel">Cargando...</div>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <!-- Modales -->
    <div id="modalOverlay" class="modal-overlay">
        <div id="customModal" class="custom-modal">
            <div class="modal-content">
                <div id="modalIcon" class="modal-icon"></div>
                <h2 id="modalTitle" class="modal-title"></h2>
                <p id="modalMessage" class="modal-message"></p>
                <div class="modal-actions"></div>
            </div>
        </div>
    </div>

    <script src="js/icons.js"></script>
    <script src="js/app.js"></script>
    <script src="js/Perfil.js"></script>
</body>
</html>
